<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="navbar-logo border">
                <div class="logo"></div>
            </div>
            <div class="nav-address border">
                <p class="location">Diliver To</p>
                <div class="ad-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="country">India</p>
                </div>
            </div>
            <div class="nav-search">
                <select class="search-select">
                    <option>All</option>
                </select>
                <input placeholder="Search Amazon" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <div class="nav-signin border">
                <p><span>Hello! Sign in</span></p>
                <p class="repeat">Account & Lists</p>
            </div>

            <div class="nav-return border">
                <p><span>Returns</span></p>
                <p class="repeat">& Orders</p>
            </div>
            <div class="nav-cart border">
                <p class="num">0</p>
                <i class="fa-solid fa-cart-shopping"></i>
                Cart
            </div>

        </div>

        <div class="panel">
            <div class="panel-all">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <div class="panel-ops">
                <a>Today's Deals</a>
                <a>Gift Cards</a>
                <a>Sell</a>
                <a>Registry</a>
                <a>Prime Video</a>
                <a>Customer Service</a>
            </div>
        </div>
    </header>

    <main>
        <div class="hero-section">
            <div class="recc">
                <p>You are on amazon.com. You can also shop on Amazon India for millions of products with fast local delivery.</p>
                <a href="#"> Click here to go to amazon.in</a>
            </div>
        </div>
    
    </main>

    <footer>
        
    </footer>
    
</body>
</html>
